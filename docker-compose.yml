services:
  neo4j:
    image: neo4j:5.26
    container_name: onlinestore-neo4j
    environment:
      # user / password — used by every cypher-shell call in the README
      NEO4J_AUTH: "neo4j/Your_password123"
      # auto-install the bundled APOC core plugin (used by the diagnostic helpers)
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      # Advertise the *host* ports so Neo4j Browser auto-connects to the right
      # Bolt endpoint even when the host port differs from the container's 7687.
      NEO4J_server_bolt_advertised__address: "localhost:${NEO4J_BOLT_PORT:-7687}"
      NEO4J_server_http_advertised__address: "localhost:${NEO4J_HTTP_PORT:-7474}"
      # This is a tiny teaching graph (a few thousand nodes) — keep the footprint
      # small so it runs on a modest Docker Desktop VM and coexists with other DBs.
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
    ports:
      # Defaults to the conventional 7474/7687. If those are already taken (e.g.
      # you run another Neo4j), set NEO4J_HTTP_PORT / NEO4J_BOLT_PORT in a .env
      # file next to this one — no need to edit this file.
      - "${NEO4J_HTTP_PORT:-7474}:7474" # HTTP — Neo4j Browser
      - "${NEO4J_BOLT_PORT:-7687}:7687" # Bolt — cypher-shell / drivers
    volumes:
      - onlinestore-neo4j-data:/data
      - ./:/workspace:ro

volumes:
  onlinestore-neo4j-data:
